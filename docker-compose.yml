services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmanager
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: 24h
      PORT: 5000
      NODE_ENV: production
      DO_API_TOKEN: ${DO_API_TOKEN:-}
      DO_DROPLET_ID: ${DO_DROPLET_ID:-}
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # Automated PostgreSQL backups to DigitalOcean Spaces
  backup:
    build:
      context: .
      dockerfile: backup/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmanager
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DO_SPACES_KEY: ${DO_SPACES_KEY:-}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET:-}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-nyc3}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_DIR: /backups
    volumes:
      - dbbackups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  pgdata:
    driver: local
  dbbackups:
    driver: local

networks:
  app-network:
    driver: bridge
