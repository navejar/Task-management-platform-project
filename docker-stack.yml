version: '3.8'

# Docker Swarm deployment stack
# Deploy with: docker stack deploy -c docker-stack.yml taskmanager

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - db_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    networks:
      - app-network

  backend:
    image: ${DOCKER_REGISTRY:-localhost:5000}/taskmanagerregistry:${BACKEND_TAG:-backend-latest}
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmanager 
      DB_USER: postgres
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRES_IN: 24h
      PORT: 5000 
      NODE_ENV: production
      DO_API_TOKEN_FILE: /run/secrets/do_api_token
      DO_DROPLET_ID: ${DO_DROPLET_ID:-}
    secrets:
      - db_password
      - jwt_secret
      - do_api_token
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  frontend:
    image: ${DOCKER_REGISTRY:-localhost:5000}/taskmanagerregistry:${FRONTEND_TAG:-frontend-latest}
    ports:
      - "80:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/taskmanager_data

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
  do_api_token:
    external: true

networks:
  app-network:
    driver: overlay
